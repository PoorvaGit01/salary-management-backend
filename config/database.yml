# PostgreSQL configuration.
# Connection settings: use a .env file (see .env.example) or your host environment.
# https://guides.rubyonrails.org/configuring.html#configuring-a-database

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  username: <%= ENV["PGUSER"].presence || ENV["USER"].presence || "postgres" %>
  password: <%= ENV["PGPASSWORD"] %>
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  port: <%= ENV.fetch("PGPORT", 5432) %>

development:
  <% if ENV["DATABASE_URL"].present? %>
  url: <%= ENV["DATABASE_URL"] %>
  <% else %>
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "salary_management_backend_development") %>
  <% end %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <% if ENV["DATABASE_URL"].present? %>
  url: <%= ENV["DATABASE_URL"] %>
  <% else %>
  <<: *default
  database: <%= ENV.fetch("DATABASE_TEST_NAME", "salary_management_backend_test") %>
  <% end %>

production:
  primary:
    <% if ENV["DATABASE_URL"].present? %>
    url: <%= ENV["DATABASE_URL"] %>
    <% else %>
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "salary_management_backend_production") %>
    <% end %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CACHE_NAME", "salary_management_backend_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DATABASE_QUEUE_NAME", "salary_management_backend_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CABLE_NAME", "salary_management_backend_production_cable") %>
    migrations_paths: db/cable_migrate
